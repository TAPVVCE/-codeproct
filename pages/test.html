<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeProct — Proctored Assessment</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/playground.css">

  <style>
    /* Extra test-page only overrides */
    body { overflow: hidden; }

    /* Disable all text selection outside editor */
    body * { user-select: none; }
    #testCodeEditor,
    #testInput { user-select: text; }

    /* Prevent print */
    @media print { body { display: none; } }
  </style>
</head>
<body>

  <!-- Header hidden during test -->
  <header id="mainHeader" style="display:none">
    <div class="logo">CODE<span>PROCT</span></div>
    <nav id="mainNav"></nav>
  </header>

  <!-- Test page rendered here by JS -->
  <div id="testPage"></div>

  <!-- Result page rendered inside testPage by JS -->

  <!-- SCRIPTS -->
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/playground.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/test.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // Restore student session from storage
      const saved = Utils.loadLocal('activeTest');
      if (saved?.student) {
        App.state.student = saved.student;
        Test.start();
      } else {
        // No session — redirect back to login
        window.location.href = '../index.html';
      }
    });
  </script>
</body>
</html>
