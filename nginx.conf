# ============================================================
# CODEPROCT — nginx.conf
# Nginx reverse proxy with WebSocket support for Socket.IO
# Replace yourdomain.com with your actual domain
# ============================================================

events {
    worker_connections 10000;   # handle 1 lakh connections
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Rate limiting ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=submit:10m rate=5r/m;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream ───────────────────────────────────────────
    upstream codeproct_app {
        server app:3000;
        keepalive 64;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

        # Client body size (for Excel uploads)
        client_max_body_size 50M;

        # ── Static files ───────────────────────────────────
        location / {
            proxy_pass         http://codeproct_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        # ── API rate limiting ──────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://codeproct_app;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Submission rate limit (prevent spam) ──────────
        location /api/student/submit {
            limit_req zone=submit burst=2 nodelay;
            proxy_pass http://codeproct_app;
        }

        # ── Socket.IO ─────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://codeproct_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }
    }
}
